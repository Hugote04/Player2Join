<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Player2Join — Encuentra tu compañero de juego</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SEO -->
  <meta name="description" content="Player2Join es la red social para gamers. Descubre juegos, construye tu colección, sigue a otros jugadores y chatea en tiempo real con tus compañeros de partida.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Player2Join">
  <meta name="theme-color" content="#7C3AED">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://player2join.vercel.app/">
  <meta property="og:title" content="Player2Join — Encuentra tu compañero de juego">
  <meta property="og:description" content="Red social para gamers. Descubre juegos, gestiona tu colección y conecta con otros jugadores en tiempo real.">
  <meta property="og:image" content="https://player2join.vercel.app/logo_entero.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Player2Join — Encuentra tu compañero de juego">
  <meta name="twitter:description" content="Red social para gamers. Descubre juegos, gestiona tu colección y conecta con otros jugadores en tiempo real.">
  <meta name="twitter:image" content="https://player2join.vercel.app/logo_entero.png">

  <!-- PWA -->
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/png" href="logo_p2j.png">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <img class="splash__logo" src="logo_entero.png" alt="Player2Join" />
    <div class="splash__bar"><span></span></div>
  </div>

  <app-root></app-root>

  <script>
    // Oculta el splash con animación cuando Angular termine de cargar
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('splash--hidden');
          setTimeout(function() { splash.remove(); }, 800);
        }
      }, 1800);
    });
  </script>
</body>
</html>
